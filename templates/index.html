<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chemist2Door – Age Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/style.css?v=999">

    <!-- Prevent caching -->
    <meta http-equiv="Cache-Control" content="no-store" />
</head>

<body>
<div class="container">

    <h1 class="main-title">Chemist2Door Secure Verify</h1>
    <p class="subtitle">Selfie + ID biometric verification</p>

    <div class="row">

        <!-- SELFIE SECTION -->
        <div class="card">
            <h2>Selfie Capture</h2>

            <div class="video-wrapper">
                <video id="video" autoplay playsinline></video>
                <div id="faceOval"></div>
            </div>

            <canvas id="selfieCanvas"></canvas>

            <button id="captureBtn" class="primary-btn">Capture Selfie</button>
        </div>

        <!-- ID SECTION -->
        <div class="card">
            <h2>ID Document</h2>

            <div class="upload-box">
                <input type="file" id="idInput" accept="image/*">
                <label for="idInput" class="upload-label">Browse ID Image</label>
                <p id="idFileName">No file selected</p>
            </div>

            <img id="idPreview" alt="ID Preview">
        </div>

    </div>

    <!-- VERIFY BUTTON -->
    <button id="verifyBtn" class="primary-btn disabled" disabled>Start Verification</button>

    <!-- RESULT BOX -->
    <div id="resultBox" class="result-box">
        <p id="resultText">Waiting for verification...</p>
    </div>

</div>

<!-- JS -->
<script src="/static/script.js?v=999" defer></script>

</body>
</html>
