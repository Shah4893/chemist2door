<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chemist2Door</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="container">
    <h1 class="main-title">Chemist2Door</h1>

    <div class="row">

        <!-- Selfie Section -->
        <div class="card">
            <h2>Selfie</h2>

            <video id="video" autoplay playsinline></video>

            <canvas id="selfieCanvas"></canvas>

            <button id="captureBtn" class="primary-btn">Capture Selfie</button>
        </div>

        <!-- ID Upload Section -->
        <div class="card">
            <h2>ID Document</h2>

            <div class="upload-box">
                <input type="file" id="idInput" accept="image/*">
                <label for="idInput" class="upload-label">Browse ID Image</label>
                <p id="idFileName">No file selected</p>
            </div>

            <img id="idPreview" alt="ID Preview">
        </div>

    </div>

    <button id="verifyBtn" class="primary-btn">Start Verification</button>

    <div id="resultBox" class="result-box">
        <p id="resultText">Waiting for verification...</p>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
