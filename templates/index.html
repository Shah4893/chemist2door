<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Identity Verification</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h1>Secure Identity Verification</h1>

    <div class="row">
        <div class="card">
            <h2>Selfie</h2>
            <video id="video" autoplay playsinline></video>
            <canvas id="selfieCanvas"></canvas>
            <button id="captureBtn">Capture Selfie</button>
        </div>

        <div class="card">
            <h2>ID Document</h2>
            <div class="upload-box">
                <input type="file" id="idInput" accept="image/*">
                <label for="idInput" class="upload-label">Browse ID Image</label>
                <p id="idFileName">No file selected</p>
            </div>
            <img id="idPreview" alt="ID Preview">
        </div>
    </div>

    <button id="verifyBtn" class="primary-btn">Start Verification</button>

    <div id="resultBox" class="result-box">
        <p id="resultText">Waiting for verification...</p>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
