<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chemist2Door – Age Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- Prevent caching (important for verification systems) -->
    <meta http-equiv="Cache-Control" content="no-store" />
</head>

<body>
<div class="container">

    <h1 class="main-title">Chemist2Door Secure Verify</h1>
    <p class="subtitle">Selfie + ID biometric verification</p>

    <div class="row">

        <!-- SELFIE SECTION -->
        <div class="card">
            <h2>Selfie Capture</h2>

            <div class="video-wrapper">
                <!-- live camera -->
                <video id="video" autoplay playsinline></video>

                <!-- face oval guide -->
                <div id="faceOval"></div>
            </div>

            <!-- frozen selfie (hold mode) -->
            <canvas id="selfieCanvas" style="display:none;"></canvas>

            <button id="captureBtn" class="primary-btn">Capture Selfie</button>
            <button id="retakeBtn" class="secondary-btn" style="display:none;">Retake Selfie</button>
        </div>

        <!-- ID UPLOAD SECTION -->
        <div class="card">
            <h2>ID Document</h2>

            <div class="upload-box">
                <input type="file" id="idInput" accept="image/*">
                <label for="idInput" class="upload-label">Browse ID Image</label>
                <p id="idFileName">No file selected</p>
            </div>

            <!-- ID preview -->
            <img id="idPreview" alt="ID Preview" style="display:none;">
        </div>

    </div>

    <!-- VERIFY BUTTON -->
    <button id="verifyBtn" class="primary-btn disabled" disabled>Start Verification</button>

    <!-- RESULT BOX -->
    <div id="resultBox" class="result-box hidden">
        <p id="resultText">Waiting for verification...</p>
    </div>

</div>

<!-- JS -->
<script src="/static/script.js"></script>
</body>
</html>
