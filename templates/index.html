<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chemist2Door – Age Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="container">

    <h1 class="main-title">Chemist2Door Secure Verify</h1>
    <p class="subtitle">Selfie + ID biometric verification</p>

    <div class="row">

        <!-- Selfie Section -->
        <div class="card">
            <h2>Selfie Capture</h2>

            <div class="video-wrapper">
                <video id="video" autoplay playsinline></video>

                <!-- FACE OVAL (IMPORTANT) -->
                <div id="faceOval"></div>
            </div>

            <!-- Canvas (HOLD MODE) -->
            <canvas id="selfieCanvas" style="display:none;"></canvas>

            <button id="captureBtn" class="primary-btn">Capture Selfie</button>
        </div>

        <!-- ID Upload Section -->
        <div class="card">
            <h2>ID Document</h2>

            <div class="upload-box">
                <input type="file" id="idInput" accept="image/*">
                <label for="idInput" class="upload-label">Browse ID Image</label>
                <p id="idFileName">No file selected</p>
            </div>

            <img id="idPreview" alt="ID Preview">
        </div>

    </div>

    <button id="verifyBtn" class="primary-btn">Start Verification</button>

    <div id="resultBox" class="result-box">
        <p id="resultText">Waiting for verification...</p>
    </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
