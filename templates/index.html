<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chemist2Door Secure Age Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1 class="main-title">Chemist2Door Secure Age Verification</h1>
        <p class="subtitle">Selfie + ID verification</p>

        <div class="row">
            <div class="card">
                <h2>Selfie Capture</h2>

                <div class="video-wrapper">
                    <video id="video" autoplay playsinline></video>
                    <div id="faceOval"></div>
                </div>

                <canvas id="selfieCanvas"></canvas>
                <button id="captureBtn" type="button">Capture Selfie</button>
            </div>

            <div class="card">
                <h2>ID Document</h2>

                <div class="upload-box">
                    <label for="idInput" class="upload-label">Upload ID Image</label>
                    <input type="file" id="idInput" accept="image/*">
                    <p id="idFileName">No file selected</p>
                    <img id="idPreview" alt="ID document preview">
                </div>
            </div>
        </div>

        <button id="verifyBtn" type="button" disabled>Start Verification</button>

        <div class="result-box" id="resultBox">
            <p id="resultText">Waiting...</p>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
